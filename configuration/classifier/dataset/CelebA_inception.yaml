dataset: CelebA
use_hdcrop: True # Whether to use the high-definition crop from https://github.com/LynnHo/HD-CelebA-Cropper?tab=readme-ov-file. The cropped images will need to be in data/celeba/hdcrop
face_dataset: True
target_type: identity 
input_size: [3, 299, 299]
resize: True # Will resize all images to the size given in input_size for all images
n_classes: 1000 # N most common classes to be chosen among the target type
val_drop_last: False # Whether drop_last=True or False on the validation and test dataloaders

permute_train_labels: False # Whether to permute the training labels (Only true for permutation experiments)

augment_data: True
normalize: True
transformations:
  use_random_resized_crop: True
  RandomResizedCrop:
    size: [299, 299]
    scale: [0.85, 1]
    ratio: [1, 1]
    antialias: true
  use_color_jitter: True
  ColorJitter:
    brightness: 0.2
    contrast: 0.2
    saturation: 0.1
    hue: 0.1
  use_random_horizontal_flip: True
  RandomHorizontalFlip:
    p: 0.5