name: "adversarial_training"

loss_weighting: # Positive values means that the loss will be minimized, negative values means that the loss will be maximized
  standard: 1.0 # Loss from the standard CE(image, target) 
  adversarial: 0.08 # Loss from the adversarial CE(image_adv, target) 

targeted: True # If True, use the targeted attack
method: "pgd" # "pgd" or "fgsm"

pgd:
  epsilon: 0.0005 
  step_size: 0.0001 
  iterations: 5 
  random_start: True

fgsm:
  epsilon: 0.0005 